providers = []

[phases.setup]
nixPkgs = ["maven", "jdk", "nodejs"]

[phases.build]
cmds = [
  "npm install",
  "npm run build",
  "ls -la dist/",
  "mkdir -p backend/src/main/resources/static",
  "cp -r dist/index.html dist/assets/ backend/src/main/resources/static/",
  "cd backend && mvn clean package -DskipTests -q"
]

[start]
cmd = "java -jar backend/target/ai-chat-backend-1.0.0.jar"
